# OpenTelemetry Collector for Argo Workflows -> Elasticsearch
# Namespace: elastic-system
---
apiVersion: v1
kind: Secret
metadata:
  name: otel-es-credentials
  namespace: elastic-system
type: Opaque
stringData:
  es-username: elastic
  es-password: "eBqox3y3pLFz8TxeoN5oL4XG"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: elastic-system
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1000

    exporters:
      elasticsearch:
        endpoints:
          - "https://${env:ES_USERNAME}:${env:ES_PASSWORD}@elastic-cluster-es-http.elastic-system.svc:9200"
        tls:
          insecure: false
          ca_file: /etc/otel/tls/ca.crt

    service:
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [elasticsearch]

---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: elastic-system
  labels:
    app: otel-collector
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
    - name: metrics
      port: 8888
      targetPort: 8888
      protocol: TCP
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: elastic-system
  labels:
    app: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8888"
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.119.0
          args:
            - "--config=/conf/otel-collector-config.yaml"
          env:
            - name: ES_USERNAME
              valueFrom:
                secretKeyRef:
                  name: otel-es-credentials
                  key: es-username
            - name: ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: otel-es-credentials
                  key: es-password
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
            - containerPort: 8888
              name: metrics
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /conf
            - name: es-ca
              mountPath: /etc/otel/tls
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
        - name: es-ca
          secret:
            secretName: apm-server-apm-es-ca
            items:
              - key: ca.crt
                path: ca.crt
