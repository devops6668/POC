apiVersion: batch/v1
kind: CronJob
metadata:
  name: argo-workflow-durations
  namespace: argo
spec:
  schedule: "*/3 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: argo-duration-sa
          containers:
          - name: collector
            image: python:3.12-alpine
            command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache curl >/dev/null 2>&1
              python3 /scripts/main.py
            envFrom:
            - secretRef:
                name: es-credentials
            env:
            - name: ES_URL
              value: https://elastic-cluster-es-http.elastic-system.svc:9200
            volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
          restartPolicy: Never
          volumes:
          - name: script
            configMap:
              name: argo-duration-script
              defaultMode: 0555
